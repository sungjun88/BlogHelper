<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Blog Helper Results</title>
    <link rel="stylesheet" href="/assets/styles.css" />
  </head>
  <body>
    <main class="page">
      <section class="hero hero-compact">
        <div class="hero-row">
          <div>
            <p class="eyebrow">Classification Result</p>
            <h1>분류 결과를 확인하고 옮기세요.</h1>
          </div>
          <a class="secondary-link" href="/">다시 업로드</a>
        </div>
      </section>

      <section class="panel summary-panel">
        <div class="panel-header">
          <div>
            <p class="section-label">Result</p>
            <h2>분류 결과</h2>
          </div>
          <div class="summary-actions">
            <div id="summaryStats" class="summary-stats"></div>
            <button id="trainButton" class="secondary-button" type="button">학습</button>
          </div>
        </div>
        <div id="editorStatus" class="editor-status"></div>
        <div id="uploadSummary" class="upload-summary"></div>
        <div id="classifierStatus" class="classifier-status"></div>
        <div id="warnings" class="warnings"></div>
        <div id="categoryGrid" class="category-grid"></div>
      </section>
    </main>

    <div id="resultsLoadingOverlay" class="loading-overlay" aria-live="polite">
      <div class="loading-card">
        <div class="loading-spinner"></div>
        <p id="resultsLoadingTitle" class="loading-title">분류 결과를 불러오고 있습니다</p>
        <p id="resultsLoadingCopy" class="loading-copy">현재 업로드된 사진을 정리하는 중입니다.</p>
      </div>
    </div>

    <template id="categoryTemplate">
      <section class="category-card">
        <header class="category-header">
          <div>
            <p class="category-key"></p>
            <h3 class="category-title"></h3>
          </div>
          <span class="category-count"></span>
        </header>
        <div class="category-drop-hint">카드를 끌어오세요.</div>
        <div class="category-items"></div>
      </section>
    </template>

    <template id="imageCardTemplate">
      <article class="image-card" draggable="true">
        <img class="image-preview" alt="" />
        <div class="image-meta">
          <p class="image-name"></p>
          <p class="image-confidence"></p>
          <p class="image-classifier"></p>
          <p class="image-origin"></p>
        </div>
      </article>
    </template>

    <script src="/assets/results.js" defer></script>
  </body>
</html>
