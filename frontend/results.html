<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Blog Helper Results</title>
    <link rel="stylesheet" href="/assets/styles.css" />
  </head>
  <body>
    <main class="page">
      <section class="hero hero-compact">
        <div class="hero-row">
          <div>
            <p class="eyebrow">Classification Result</p>
            <h1>GPS rows and category columns</h1>
            <p class="hero-copy">
              Each row is a GPS place group. Each column is a category. Drag thumbnails across columns inside the same row.
            </p>
          </div>
          <a class="secondary-link" href="/">Upload Again</a>
        </div>
      </section>

      <section class="panel summary-panel">
        <div class="panel-header">
          <div>
            <p class="section-label">Result</p>
            <h2>Grouped Results</h2>
          </div>
          <div class="summary-actions">
            <div id="summaryStats" class="summary-stats"></div>
            <button id="trainButton" class="secondary-button" type="button">Train</button>
          </div>
        </div>
        <div id="editorStatus" class="editor-status"></div>
        <div id="uploadSummary" class="upload-summary"></div>
        <div id="classifierStatus" class="classifier-status"></div>
        <div id="warnings" class="warnings"></div>
        <div id="matrixBoard" class="matrix-board"></div>
      </section>
    </main>

    <div id="resultsLoadingOverlay" class="loading-overlay" aria-live="polite">
      <div class="loading-card">
        <div class="loading-spinner"></div>
        <p id="resultsLoadingTitle" class="loading-title">Loading results</p>
        <p id="resultsLoadingCopy" class="loading-copy">Organizing uploaded media.</p>
      </div>
    </div>

    <template id="imageCardTemplate">
      <article class="image-card" draggable="true">
        <img class="image-preview" alt="" />
        <div class="image-meta">
          <p class="image-name"></p>
          <p class="image-confidence"></p>
          <p class="image-classifier"></p>
          <p class="image-origin"></p>
        </div>
      </article>
    </template>

    <script src="/assets/results.js" defer></script>
  </body>
</html>
