<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Blog Helper Upload</title>
    <link rel="icon" href="/assets/favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="/assets/styles.css" />
  </head>
  <body>
    <main class="page">
      <section class="hero">
        <p class="eyebrow">Naver Blog Photo Sorter</p>
        <h1>Blog Helper v0.5.1</h1>
        <p class="hero-copy">
          사진을 올리면 자동으로 분류됩니다.
        </p>
      </section>

      <section class="panel upload-panel">
        <div
          id="dropzone"
          class="dropzone"
          role="button"
          tabindex="0"
          aria-label="이미지 업로드"
        >
          <div class="dropzone-inner">
            <p class="dropzone-title">사진을 여기로 드래그하세요</p>
            <p class="dropzone-subtitle">또는 파일 선택 버튼으로 여러 장을 업로드하세요</p>
            <button id="pickButton" class="primary-button" type="button">파일 선택</button>
            <input
              id="fileInput"
              class="hidden-input"
              type="file"
              accept="image/*,video/*"
              multiple
            />
          </div>
        </div>

        <div class="toolbar">
          <div id="selectionInfo" class="selection-info">아직 선택된 파일이 없습니다.</div>
          <button id="uploadButton" class="secondary-button" type="button" disabled>
            업로드하고 분류 시작
          </button>
        </div>

        <ul id="selectedList" class="selected-list"></ul>
        <div id="feedback" class="feedback" aria-live="polite"></div>
      </section>
    </main>

    <div id="loadingOverlay" class="loading-overlay is-hidden" aria-live="polite">
      <div class="loading-card">
        <div class="loading-spinner"></div>
        <p id="loadingTitle" class="loading-title">사진을 업로드하고 분류하고 있습니다</p>
        <p id="loadingMessage" class="loading-copy">작업을 시작하는 중입니다.</p>
        <div class="progress-panel">
          <div class="progress-bar-track" aria-hidden="true">
            <div id="progressBarFill" class="progress-bar-fill"></div>
          </div>
          <div class="progress-stats">
            <span id="progressPercent">0%</span>
            <span id="progressCount">0 / 0 파일</span>
          </div>
          <div class="progress-timings">
            <span id="elapsedTime">경과 0초</span>
            <span id="estimatedTime">예상 총 0초</span>
            <span id="remainingTime">남은 0초</span>
          </div>
          <p id="currentTask" class="current-task">대기 중</p>
        </div>
      </div>
    </div>

    <script src="/assets/app.js" defer></script>
  </body>
</html>
